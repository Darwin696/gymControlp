<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      lang="es">
<h:head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gym Controller | Planes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #051424; color: #d4e4fa; }
        .glass { background: rgba(30,30,30,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-active { background: #4be277; color: #051424; font-weight: 700; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #d4e4fa; border-radius: 0.5rem; padding: 0.5rem 0.75rem; width: 100%; }
    </style>
</h:head>
<h:body class="min-h-screen flex">
    <aside class="w-64 bg-[#0d1c2d] border-r border-white/10 p-4 flex flex-col fixed h-full">
        <div class="flex items-center gap-3 mb-8 mt-2">
            <div class="w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center text-xl">🏋️</div>
            <div>
                <h2 class="font-bold text-green-400 text-lg">Apex Fitness</h2>
                <p class="text-xs text-gray-400">Gym Management</p>
            </div>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="inicio.xhtml" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300"><span class="material-symbols-outlined text-lg">dashboard</span> Dashboard</a>
            <a href="miembros.xhtml" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300"><span class="material-symbols-outlined text-lg">group</span> Miembros</a>
            <a href="planes.xhtml" class="nav-item nav-active flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-symbols-outlined text-lg">card_membership</span> Planes</a>
            <a href="pagos.xhtml" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300"><span class="material-symbols-outlined text-lg">payments</span> Pagos</a>
            <a href="instructores.xhtml" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300"><span class="material-symbols-outlined text-lg">fitness_center</span> Instructores</a>
            <a href="reportes.xhtml" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300"><span class="material-symbols-outlined text-lg">analytics</span> Reportes</a>
        </nav>
        <h:form>
            <h:commandButton value="Cerrar Sesión" action="#{loginBean.logout}" styleClass="w-full mt-4 py-2 bg-white/10 rounded-lg text-sm hover:bg-white/20 cursor-pointer text-white"/>
        </h:form>
    </aside>

    <main class="flex-1 ml-64 p-8">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-green-400 uppercase tracking-tight">Planes de Membresía</h1>
        </header>

        <!-- Formulario nuevo plan -->
        <div class="glass rounded-xl p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">+ Nuevo Plan</h2>
            <h:form>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Nombre *</label>
                        <h:inputText value="#{vistaGymBean.nuevoPlanNombre}" required="true"/>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Tipo</label>
                        <h:selectOneMenu value="#{vistaGymBean.nuevoPlanTipo}">
                            <f:selectItem itemValue="Basic" itemLabel="Basic"/>
                            <f:selectItem itemValue="Pro" itemLabel="Pro"/>
                            <f:selectItem itemValue="Premium" itemLabel="Premium"/>
                        </h:selectOneMenu>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Precio</label>
                        <h:inputText value="#{vistaGymBean.nuevoPlanPrecio}"/>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Descripción</label>
                        <h:inputText value="#{vistaGymBean.nuevoPlanDescripcion}"/>
                    </div>
                </div>
                <h:commandButton value="Agregar Plan" action="#{vistaGymBean.agregarPlan}"
                    styleClass="bg-green-500 text-black font-semibold px-6 py-2 rounded-lg hover:brightness-110 cursor-pointer"/>
            </h:form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <ui:repeat value="#{vistaGymBean.planes}" var="p">
                <div class="glass rounded-xl p-6 flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs uppercase tracking-wider text-gray-400">#{p.tipo}</span>
                        <span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-xs font-semibold">Activo</span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-1">#{p.nombre}</h3>
                    <p class="text-3xl font-bold text-green-400 mb-2">$#{p.precio}</p>
                    <p class="text-sm text-gray-400 mb-4">#{p.descripcion}</p>
                    <h:form>
                        <h:commandButton value="Eliminar" action="#{vistaGymBean.eliminarPlan(p)}"
                            styleClass="w-full py-2 bg-red-500/20 text-red-400 rounded-lg text-sm hover:bg-red-500/30 cursor-pointer"
                            onclick="return confirm('¿Eliminar este plan?');"/>
                    </h:form>
                </div>
            </ui:repeat>
        </div>
    </main>
</h:body>
</html>
