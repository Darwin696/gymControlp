<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      lang="es">
<h:head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gym Controller | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #051424; color: #d4e4fa; }
        .glass { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</h:head>
<h:body class="min-h-screen flex items-center justify-center">
    <div class="glass p-10 rounded-xl w-full max-w-md text-center">
        <div class="mb-8">
            <div class="w-14 h-14 bg-green-500 rounded-lg flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🏋️</span>
            </div>
            <h1 class="text-2xl font-bold uppercase tracking-tight">Gym Controller</h1>
            <p class="text-sm text-gray-400 mt-1">Apex Fitness Management</p>
        </div>
        <h:form>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-sm text-gray-400">Email</label>
                    <h:inputText value="#{loginBean.email}" styleClass="w-full mt-1 p-3 rounded-lg bg-white/5 border border-white/10 text-white" />
                </div>
                <div>
                    <label class="text-sm text-gray-400">Password</label>
                    <h:inputSecret value="#{loginBean.password}" styleClass="w-full mt-1 p-3 rounded-lg bg-white/5 border border-white/10 text-white" />
                </div>
                <h:commandButton value="Ingresar" action="#{loginBean.login}" 
                    styleClass="w-full mt-6 py-3 bg-green-500 text-black font-bold rounded-lg hover:brightness-110 cursor-pointer" />
            </div>
        </h:form>
        <p class="mt-6 text-xs text-gray-500">admin / admin123</p>
    </div>
</h:body>
</html>
